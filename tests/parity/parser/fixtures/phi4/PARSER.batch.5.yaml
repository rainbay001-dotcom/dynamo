family: phi4
mode: batch
cases:
  PARSER.batch.5.a:
    description: No explicit end (truncation)
    ref: dynamo
    model_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: 'functools[{"name": "get_weather", "arguments": {"location": "NYC"}}'
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.5.b:
    description: Closing `]` without matching `functools[` open
    ref: dynamo
    model_text: 'functools{"name": "get_weather", "arguments": {"location": "NYC"}}]'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        calls: []
        normal_text: 'functools{"name": "get_weather", "arguments": {"location": "NYC"}}]'
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang:
        unavailable: SGLang has no detector for family='phi4'
  PARSER.batch.5.c:
    description: Truncation mid-arguments JSON
    ref: dynamo
    model_text: 'functools[{"name": "get_weather", "arguments": {"loc'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: 'functools[{"name": "get_weather", "arguments": {"loc'
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang:
        unavailable: SGLang has no detector for family='phi4'
