family: llama3_json
model_label: Llama 3 (JSON fmt)
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_1
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_1
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.2:
    description: Multiple tool calls (parallel, semicolon-separated)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_time", "arguments":
      {"timezone": "EST"}}'
    tools:
    - *id001
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      dynamo: &d_3
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *d_3
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id001
    expected:
      dynamo: &d_9
        calls: []
        normal_text: ''
      vllm: *d_9
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.10:
    description: Duplicate calls (same name twice, semicolon-separated)
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_weather", "arguments":
      {"location": "LA"}}'
    tools:
    - *id001
    expected:
      dynamo: &d_10
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_10
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.11:
    description: Single call with semicolon inside argument string value
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT a; SELECT b"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    expected:
      dynamo: &d_11
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        normal_text: ''
      vllm: *d_11
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.12:
    description: Parallel calls where one argument contains a semicolon (streaming split safety)
    model_text: '<|python_tag|>{"name": "run_query", "arguments": {"sql": "SELECT a; SELECT b"}};{"name": "get_time", "arguments": {"timezone": "EST"}}'
    tools:
    - name: run_query
      parameters:
        type: object
        properties:
          sql:
            type: string
    - &id_time
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_12
        calls:
        - name: run_query
          arguments:
            sql: SELECT a; SELECT b
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_12
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
