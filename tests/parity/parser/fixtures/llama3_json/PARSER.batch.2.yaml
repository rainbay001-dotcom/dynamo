family: llama3_json
mode: batch
cases:
  PARSER.batch.2.a:
    description: Parallel calls (semicolon-separated)
    ref: dynamo
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_time", "arguments":
      {"timezone": "EST"}}'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2a
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: 'Both: <|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_time", "arguments":
      {"timezone": "EST"}} Done.'
    tools:
    - *id001
    - *id002
    expected:
      dynamo: &d_2c
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:'
      vllm:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
        reason: "vLLM llama3_json drops leading normal_text before the python_tag token"
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.2.d:
    description: Same-name twice (semicolon-separated)
    ref: dynamo
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}};{"name": "get_weather", "arguments":
      {"location": "LA"}}'
    tools:
    - *id001
    - *id001
    expected:
      dynamo: &d_2d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_2d
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
