family: llama3_json
mode: batch
cases:
  PARSER.batch.8.a:
    description: Narration before tool call only
    ref: dynamo
    model_text: 'I will check the weather. <|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}}'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: '<|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}} Let me know if you need more.'
    tools:
    - *id001
    expected:
      dynamo: &d_8_b
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_8_b
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_llama3_json_tool_parser.py#L128
    model_text: 'I will check the weather. <|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}} Let me
      know if you need more.'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: I will check the weather.
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
  PARSER.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: 'I will check the weather. <|python_tag|>{"name": "get_weather", "arguments": {"location": "NYC"}} Then check
      LA weather. <|python_tag|>{"name": "get_weather", "arguments": {"location": "LA"}}'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: I will check the weather.
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: ''
      sglang:
        unavailable: SGLang has no detector for family='llama3_json'
