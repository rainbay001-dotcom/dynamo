family: deepseek_v3_2
mode: batch
cases:
  PARSER.batch.4.a:
    description: Function_calls wrapper with garbage
    ref: dynamo
    model_text: |-
      <｜DSML｜function_calls>
      not a valid invoke
      </｜DSML｜function_calls>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<｜DSML｜function_calls>

          not a valid invoke

          </｜DSML｜function_calls>'
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang: *d_4_a
  # PARSER.batch.4.b (invalid JSON args) n/a: DSML uses attribute-encoded args, not JSON.
  PARSER.batch.4.c:
    description: Invoke without name attribute
    ref: dynamo
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke>
      <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id001
    expected:
      dynamo: &d_4_c
        calls: []
        normal_text: ''
      vllm:
        calls: []
        normal_text: '<｜DSML｜function_calls>

          <｜DSML｜invoke>

          <｜DSML｜parameter name="location" string="true">NYC</｜DSML｜parameter>

          </｜DSML｜invoke>

          </｜DSML｜function_calls>'
        reason: "vLLM leaks the tool call tag into normal_text on the recovery path"
      sglang: *d_4_c
  PARSER.batch.4.d:
    description: Missing </｜DSML｜parameter> end tag
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_deepseekv32_tool_parser.py#L499
    model_text: |-
      <｜DSML｜function_calls>
      <｜DSML｜invoke name="get_weather">
      <｜DSML｜parameter name="location" string="true">NYC
      </｜DSML｜invoke>
      </｜DSML｜function_calls>
    tools:
    - *id001
    expected:
      dynamo: &d_4_d
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
      vllm: *d_4_d
      sglang: *d_4_d
