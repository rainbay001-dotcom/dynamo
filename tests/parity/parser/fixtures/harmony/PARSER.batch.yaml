family: harmony
model_label: gpt-oss
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (basic complete envelope)
    model_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: 'NotImplementedError: OpenAIToolParser requires token IDs and does not support text-based extraction.'
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      dynamo: &id002
        calls: []
        normal_text: Hello, how can I help you today?
      vllm:
        unavailable: 'NotImplementedError: OpenAIToolParser requires token IDs and does not support text-based extraction.'
      sglang: *id002
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id001
    expected:
      dynamo: &id003
        calls: []
        normal_text: ''
      vllm:
        unavailable: 'NotImplementedError: OpenAIToolParser requires token IDs and does not support text-based extraction.'
      sglang: *id003
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|><|start|>assistant<|channel|>commentary
      to=functions.get_weather <|constrain|>json<|message|>{"location":"LA"}<|call|>
    tools:
    - *id001
    expected:
      dynamo:
        reason: "Dynamo leaks back-to-back same-name commentary blocks into normal_text instead of extracting both duplicate calls"
        calls: []
        normal_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC"}<|call|><|start|>assistant<|channel|>commentary
          to=functions.get_weather <|constrain|>json<|message|>{"location":"LA"}<|call|>
      vllm:
        unavailable: 'NotImplementedError: OpenAIToolParser requires token IDs and does not support text-based extraction.'
      sglang:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
  PARSER.batch.11:
    description: Separator-character case — n/a for this family's syntax
    reason: |-
      PARSER.batch.11 targets delimiter-separated parser formats. harmony uses channel/recipient/message envelope tokens plus a JSON payload rather than delimiter-splitting multiple calls with an in-band separator, so this separator-state regression has no separate grammar surface here.
  PARSER.batch.12:
    description: Multi-call separator-character case — n/a for this family's syntax
    reason: |-
      PARSER.batch.11 targets delimiter-separated parser formats. harmony uses channel/recipient/message envelope tokens plus a JSON payload rather than delimiter-splitting multiple calls with an in-band separator, so this separator-state regression has no separate grammar surface here. PARSER.batch.12 is the multi-call version of the same separator-state check, so the same applicability rule applies.
  PARSER.batch.13:
    description: Unknown tool name absent from supplied tools
    ref: dynamo
    model_text: <|channel|>commentary to=functions.unknown_tool <|constrain|>json<|message|>{"location":"NYC"}
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: unknown_tool
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: 'NotImplementedError: OpenAIToolParser requires token IDs and does not support text-based extraction.'
      sglang:
        calls: []
        normal_text: <|channel|>commentary to=functions.unknown_tool <|constrain|>json<|message|>{"location":"NYC"}
        reason: SGLang treats an unknown harmony recipient as ordinary content rather than forwarding a tool call by default.
