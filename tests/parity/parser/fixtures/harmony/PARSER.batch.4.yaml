family: harmony
mode: batch
cases:
  PARSER.batch.4.a:
    description: Channel envelope with garbage body
    ref: dynamo
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>not json at all<|call|>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        reason: "Dynamo's harmony parser leaves <|channel|> harmony token, <|message|> harmony token, <|call|> harmony token (+2 more) in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>not json
          at all<|call|>
      vllm:
        unavailable: 'NotImplementedError: OpenAIToolParser requires token IDs and does not support text-based extraction.'
      sglang:
        calls: []
        normal_text: ''
  PARSER.batch.4.b:
    description: Unterminated JSON in message body
    ref: dynamo
    model_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC<|call|>
    tools:
    - *id001
    expected:
      dynamo:
        reason: "Dynamo's harmony parser leaves <|channel|> harmony token, <|message|> harmony token, <|call|> harmony token (+2 more) in normal_text on malformed input (impl-defined recovery)"
        calls: []
        normal_text: <|start|>assistant<|channel|>commentary to=functions.get_weather <|constrain|>json<|message|>{"location":"NYC<|call|>
      vllm:
        unavailable: 'NotImplementedError: OpenAIToolParser requires token IDs and does not support text-based extraction.'
      sglang:
        calls: []
        normal_text: ''
  PARSER.batch.4.c:
    description: No to=functions.X recipient
    ref: dynamo
    model_text: <|start|>assistant<|channel|>commentary <|constrain|>json<|message|>{"location":"NYC"}<|call|>
    tools:
    - *id001
    expected:
      dynamo: &id002
        calls: []
        normal_text: ''
      vllm:
        unavailable: 'NotImplementedError: OpenAIToolParser requires token IDs and does not support text-based extraction.'
      sglang: *id002
  PARSER.batch.4.d:
    description: Malformed variant 4.d — not applicable to this family
    reason: |-
      Malformed-input variant 4.d does not apply to harmony's parser syntax (no equivalent end-marker recovery scenario).
  PARSER.batch.4.e:
    description: Malformed-prefix recovery — n/a for this family's syntax
    reason: |-
      PARSER.batch.4.e is specific to llama3_json's raw JSON-object scanner: a malformed JSON-looking prefix is followed by a complete JSON object, and the detector may resynchronize on the later object. This family uses a framed parser grammar instead of that raw JSON-prefix scanner; malformed-input coverage for this family lives in PARSER.batch.4.a through 4.d.
