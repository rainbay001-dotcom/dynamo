#
# `|2+` simply means a single newline ("\n"); see tests/parity/README.md for the full decode.

family: deepseek_v4
mode: batch
cases:
  PARSER.batch.2.a:
    description: Two invokes inside one tool_calls wrapper
    ref: dynamo
    # `|-` = literal block scalar, strip trailing newline (multi-line text as-is)
    model_text: |-
      <ÔĹúDSMLÔĹútool_calls>
      <ÔĹúDSMLÔĹúinvoke name="get_weather">
      <ÔĹúDSMLÔĹúparameter name="location" string="true">NYC</ÔĹúDSMLÔĹúparameter>
      </ÔĹúDSMLÔĹúinvoke>
      <ÔĹúDSMLÔĹúinvoke name="get_time">
      <ÔĹúDSMLÔĹúparameter name="timezone" string="true">EST</ÔĹúDSMLÔĹúparameter>
      </ÔĹúDSMLÔĹúinvoke>
      </ÔĹúDSMLÔĹútool_calls>
    tools:
    # `&idN` defines an anchor; `*idN` below reuses the same tool def
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: ''
  PARSER.batch.2.b:
    description: Two back-to-back tool_calls wrappers
    ref: dynamo
    model_text: |-
      <ÔĹúDSMLÔĹútool_calls>
      <ÔĹúDSMLÔĹúinvoke name="get_weather">
      <ÔĹúDSMLÔĹúparameter name="location" string="true">NYC</ÔĹúDSMLÔĹúparameter>
      </ÔĹúDSMLÔĹúinvoke>
      </ÔĹúDSMLÔĹútool_calls>
      <ÔĹúDSMLÔĹútool_calls>
      <ÔĹúDSMLÔĹúinvoke name="get_time">
      <ÔĹúDSMLÔĹúparameter name="timezone" string="true">EST</ÔĹúDSMLÔĹúparameter>
      </ÔĹúDSMLÔĹúinvoke>
      </ÔĹúDSMLÔĹútool_calls>
    tools:
    - *id001
    - *id002
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      # `|2+` below = "\n" (see file header)
      normal_text: |2+

    # TODO(research): vllm diverges ‚ÄĒ vLLM deepseek_v4 does not restart parsing on a second back-to-back fence pair
    # vllm produces:
    #   calls: [{'name': 'get_weather', 'arguments': {'location': 'NYC'}}, {'name': 'get_time', 'arguments': {'timezone': 'EST'}}]
    #   normal_text: None
  PARSER.batch.2.c:
    description: Parallel with surrounding narration
    ref: dynamo
    model_text: |-
      Both: <ÔĹúDSMLÔĹútool_calls>
      <ÔĹúDSMLÔĹúinvoke name="get_weather">
      <ÔĹúDSMLÔĹúparameter name="location" string="true">NYC</ÔĹúDSMLÔĹúparameter>
      </ÔĹúDSMLÔĹúinvoke>
      <ÔĹúDSMLÔĹúinvoke name="get_time">
      <ÔĹúDSMLÔĹúparameter name="timezone" string="true">EST</ÔĹúDSMLÔĹúparameter>
      </ÔĹúDSMLÔĹúinvoke>
      </ÔĹúDSMLÔĹútool_calls> Done.
    tools:
    - *id001
    - *id002
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: 'Both:  Done.'
    # TODO(research): vllm diverges ‚ÄĒ drops trailing normal_text after tool-call wrapper end
    # vllm produces:
    #   calls: [{'name': 'get_weather', 'arguments': {'location': 'NYC'}}, {'name': 'get_time', 'arguments': {'timezone': 'EST'}}]
    #   normal_text: 'Both: '
  PARSER.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: |-
      <ÔĹúDSMLÔĹútool_calls>
      <ÔĹúDSMLÔĹúinvoke name="get_weather">
      <ÔĹúDSMLÔĹúparameter name="location" string="true">NYC</ÔĹúDSMLÔĹúparameter>
      </ÔĹúDSMLÔĹúinvoke>
      <ÔĹúDSMLÔĹúinvoke name="get_weather">
      <ÔĹúDSMLÔĹúparameter name="location" string="true">LA</ÔĹúDSMLÔĹúparameter>
      </ÔĹúDSMLÔĹúinvoke>
      </ÔĹúDSMLÔĹútool_calls>
    tools:
    - *id001
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_weather
        arguments:
          location: LA
      normal_text: ''
