family: deepseek_v4
mode: batch
cases:
  PARSER.batch.6.a:
    description: Invoke with no <parameter>
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_time">
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &d_6_a
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_a
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  PARSER.batch.6.b:
    description: Invoke with extra newline
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_time">

      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id001
    expected:
      dynamo: &d_6_b
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_b
      sglang:
        unavailable: SGLang has no detector for family='deepseek_v4'
  # PARSER.batch.6.c (arguments-key absent) n/a: DSML has no 'arguments' key — params are <｜DSML｜parameter> children of <｜DSML｜invoke>. Zero-args is already case 6.a.
