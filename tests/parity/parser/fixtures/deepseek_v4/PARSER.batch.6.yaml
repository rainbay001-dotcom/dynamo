family: deepseek_v4
mode: batch
cases:
  PARSER.batch.6.a:
    description: Invoke with no <parameter>
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_time">
      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
  PARSER.batch.6.b:
    description: Invoke with extra newline
    ref: dynamo
    model_text: |-
      <｜DSML｜tool_calls>
      <｜DSML｜invoke name="get_time">

      </｜DSML｜invoke>
      </｜DSML｜tool_calls>
    tools:
    - *id001
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
