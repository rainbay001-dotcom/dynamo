family: jamba
mode: batch
cases:
  PARSER.batch.2.a:
    description: Parallel calls in JSON array
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_time", "arguments":
      {"timezone": "EST"}}]</tool_calls>'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2_a
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  PARSER.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: 'Both: <tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_time", "arguments":
      {"timezone": "EST"}}]</tool_calls> Done.'
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:'
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: 'Both: '
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang:
        unavailable: SGLang has no detector for family='jamba'
  PARSER.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: '<tool_calls>[{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_weather", "arguments":
      {"location": "LA"}}]</tool_calls>'
    tools:
    - *id001
    - *id001
    expected:
      dynamo: &d_2_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_2_d
      sglang:
        unavailable: SGLang has no detector for family='jamba'
