family: minimax_m2
mode: batch
cases:
  PARSER.batch.6.a:
    description: Invoke with no <parameter>
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_time">
      </invoke>
      </minimax:tool_call>
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
  PARSER.batch.6.b:
    description: Invoke with extra newline
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_time">

      </invoke>
      </minimax:tool_call>
    tools:
    - *id001
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
