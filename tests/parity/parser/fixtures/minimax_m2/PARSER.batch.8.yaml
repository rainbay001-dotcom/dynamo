family: minimax_m2
mode: batch
cases:
  PARSER.batch.8.a:
    description: Narration before tool call only
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_minimax_m2_tool_parser.py#L126
    model_text: |-
      I will check the weather. <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_8_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm: *d_8_a
      sglang: *d_8_a
  PARSER.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call> Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo: &d_8_b
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_8_b
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: ' Let me know if you need more.'
        reason: "sglang preserves trailing normal_text after wrapper end; Dynamo trims it (post-#9350)"
  PARSER.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: dynamo
    model_text: |-
      I will check the weather. <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call> Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo: &d_8_c
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm: *d_8_c
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.  Let me know if you need more.
        reason: "sglang preserves trailing normal_text after wrapper end; Dynamo trims it (post-#9350)"
  PARSER.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: |-
      I will check the weather. <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call> Then check LA weather. <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">LA</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id001
    expected:
      dynamo: &d_8_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: 'I will check the weather. '
      vllm: *d_8_d
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            location: LA
          name: get_weather
        normal_text: 'I will check the weather.  Then check LA weather. '
        reason: "sglang preserves trailing normal_text after wrapper end; Dynamo trims it (post-#9350)"
