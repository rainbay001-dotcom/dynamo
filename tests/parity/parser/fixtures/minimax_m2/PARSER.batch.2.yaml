family: minimax_m2
mode: batch
cases:
  PARSER.batch.2.a:
    description: Two invokes inside one tool_call wrapper
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      <invoke name="get_time">
      <parameter name="timezone">EST</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: ''
  PARSER.batch.2.b:
    description: Two back-to-back tool_call wrappers
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_minimax_m2_tool_parser.py#L207
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
      <minimax:tool_call>
      <invoke name="get_time">
      <parameter name="timezone">EST</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id001
    - *id002
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: ''
  PARSER.batch.2.c:
    description: Parallel with surrounding narration
    ref: dynamo
    model_text: |-
      Both: <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      <invoke name="get_time">
      <parameter name="timezone">EST</parameter>
      </invoke>
      </minimax:tool_call> Done.
    tools:
    - *id001
    - *id002
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_time
        arguments:
          timezone: EST
      normal_text: 'Both: '
  PARSER.batch.2.d:
    description: Same-name twice
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_minimax_m2_tool_parser.py#L331
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      <invoke name="get_weather">
      <parameter name="location">LA</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id001
    - *id001
    expected:
      calls:
      - name: get_weather
        arguments:
          location: NYC
      - name: get_weather
        arguments:
          location: LA
      normal_text: ''
