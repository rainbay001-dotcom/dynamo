family: minimax_m2
mode: batch
cases:
  PARSER.batch.7.a:
    description: Multiple parameters
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="book_flight">
      <parameter name="destination">Paris</parameter>
      <parameter name="passengers">2</parameter>
      <parameter name="first_class">true</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      calls:
      - name: book_flight
        arguments:
          destination: Paris
          first_class: true
          passengers: 2
      normal_text: ''
    # TODO(research): vllm diverges — vLLM emits JSON-typed parameter values as raw strings; Dynamo coerces nested object/array types
    # vllm produces:
    #   calls: [{'name': 'book_flight', 'arguments': {'destination': 'Paris', 'passengers': '2', 'first_class': 'true'}}]
    #   normal_text: None
  PARSER.batch.7.b:
    description: Unicode in parameter
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">Tōkyō central</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: Tōkyō central
      normal_text: ''
