family: minimax_m2
mode: batch
cases:
  PARSER.batch.5.a:
    description: Missing </minimax:tool_call> end marker
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NYC</parameter>
          </invoke>
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NYC</parameter>
          </invoke>
        reason: impl-defined recovery contract (see PARSER_CASES.md)
      sglang:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NYC</parameter>
          </invoke>
        reason: impl-defined recovery contract (see PARSER_CASES.md)
  PARSER.batch.5.b:
    description: Closing </minimax:tool_call> without matching open
    ref: dynamo
    model_text: |-
      <invoke name="get_weather">
      <parameter name="location">NYC</parameter>
      </invoke>
      </minimax:tool_call>
    tools:
    - *id001
    expected:
      dynamo: &id002
        calls: []
        normal_text: |-
          <invoke name="get_weather">
          <parameter name="location">NYC</parameter>
          </invoke>
          </minimax:tool_call>
      vllm: *id002
      sglang: *id002
  PARSER.batch.5.c:
    description: Truncation mid-parameter value
    ref: dynamo
    model_text: |-
      <minimax:tool_call>
      <invoke name="get_weather">
      <parameter name="location">NY
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NY
      vllm:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NY
        reason: impl-defined recovery contract (see PARSER_CASES.md)
      sglang:
        calls: []
        normal_text: |-
          <minimax:tool_call>
          <invoke name="get_weather">
          <parameter name="location">NY
        reason: sglang nullifies normal_text on malformed/recovery shapes where Dynamo preserves input
