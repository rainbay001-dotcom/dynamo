    expected:
      dynamo: &d_8_c
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm: *d_8_c
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.
        reason: "trims trailing space from preceding normal_text"
  PARSER.batch.8.d:
