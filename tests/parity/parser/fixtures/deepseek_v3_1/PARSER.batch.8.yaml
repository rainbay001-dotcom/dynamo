family: deepseek_v3_1
mode: batch
cases:
  PARSER.batch.8.a:
    description: Narration before tool call only
    ref: dynamo
    model_text: I will check the weather. <пљЬtoolвЦБcallsвЦБbeginпљЬ><пљЬtoolвЦБcallвЦБbeginпљЬ>get_weather<пљЬtoolвЦБsepпљЬ>{"location":"NYC"}<пљЬtoolвЦБcallвЦБendпљЬ><пљЬtoolвЦБcallsвЦБendпљЬ>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_8_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: 'I will check the weather. '
      vllm: *d_8_a
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        normal_text: I will check the weather.
        reason: "trims trailing space from preceding normal_text"
  PARSER.batch.8.b:
    description: Narration after tool call only
    ref: dynamo
    model_text: <пљЬtoolвЦБcallsвЦБbeginпљЬ><пљЬtoolвЦБcallвЦБbeginпљЬ>get_weather<пљЬtoolвЦБsepпљЬ>{"location":"NYC"}<пљЬtoolвЦБcallвЦБendпљЬ><пљЬtoolвЦБcallsвЦБendпљЬ>
      Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo: &d_8_b
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_8_b
      sglang: *d_8_b
  PARSER.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: dynamo
    model_text: I will check the weather. <пљЬtoolвЦБcallsвЦБbeginпљЬ><пљЬtoolвЦБcallвЦБbeginпљЬ>get_weather<пљЬtoolвЦБsepпљЬ>{"location":"NYC"}<пљЬtoolвЦБcallвЦБendпљЬ><пљЬtoolвЦБcallsвЦБendпљЬ>
      Let me know if you need more.
    tools:
