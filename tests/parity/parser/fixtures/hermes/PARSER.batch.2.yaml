family: hermes
mode: batch
cases:
  PARSER.batch.2.a:
    description: Parallel calls (back-to-back tool_call wrappers)
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call><tool_call>{"name": "get_time",
      "arguments": {"timezone": "EST"}}</tool_call>'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2_a
      sglang: *d_2_a
  PARSER.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: 'Both: <tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call><tool_call>{"name":
      "get_time", "arguments": {"timezone": "EST"}}</tool_call> Done.'
    tools:
    - *id001
    - *id002
    expected:
      dynamo: &d_2_c
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:'
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: 'Both: '
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang: *d_2_c
  PARSER.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: '<tool_call>{"name": "get_weather", "arguments": {"location": "NYC"}}</tool_call><tool_call>{"name": "get_weather",
      "arguments": {"location": "LA"}}</tool_call>'
    tools:
    - *id001
    - *id001
    expected:
      dynamo: &d_2_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_2_d
      sglang: *d_2_d
