family: hermes
mode: batch
cases:
  PARSER.batch.6.a:
    description: 'Canonical "arguments": {}'
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time", "arguments": {}}</tool_call>'
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &d_6_a
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_a
      sglang: *d_6_a
  PARSER.batch.6.b:
    description: Whitespace inside arguments {}
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time", "arguments": { }}</tool_call>'
    tools:
    - *id001
    expected:
      dynamo: &d_6_b
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_b
      sglang: *d_6_b
  PARSER.batch.6.c:
    description: No arguments key
    ref: dynamo
    model_text: '<tool_call>{"name": "get_time"}</tool_call>'
    tools:
    - *id001
    expected:
      dynamo: &d_6_c
        calls: []
        normal_text: '<tool_call>{"name": "get_time"}</tool_call>'
      vllm: *d_6_c
      sglang:
        calls:
        - arguments: {}
          name: get_time
        normal_text: ''
