family: mistral
mode: batch
cases:
  PARSER.batch.2.a:
    description: Parallel calls in JSON array
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_time", "arguments":
      {"timezone": "EST"}}][/TOOL_CALLS]'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2_a
      sglang:
        calls: []
        normal_text: ''
        reason: "SGLang MistralDetector returns calls=[] on the bare [TOOL_CALLS]...[/TOOL_CALLS] format Dynamo emits"
  PARSER.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: 'Both: [TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_time", "arguments":
      {"timezone": "EST"}}][/TOOL_CALLS] Done.'
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:'
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: 'Both: '
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang:
        calls: []
        normal_text: 'Both:'
        reason: "trims trailing space from preceding normal_text"
  PARSER.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_weather", "arguments":
      {"location": "LA"}}][/TOOL_CALLS]'
    tools:
    - *id001
    - *id001
    expected:
      dynamo: &d_2_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_2_d
      sglang:
        calls: []
        normal_text: ''
