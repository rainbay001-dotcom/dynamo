family: mistral
mode: batch
cases:
  PARSER.batch.7.a:
    description: Standard scalar types
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "book_flight", "arguments": {"destination": "Paris", "passengers": 2, "first_class":
      true}}][/TOOL_CALLS]'
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &d_7_a
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            first_class: true
            passengers: 2
        normal_text: ''
      vllm: *d_7_a
      sglang:
        calls: []
        normal_text: ''
        reason: "SGLang MistralDetector returns calls=[] on the bare [TOOL_CALLS]...[/TOOL_CALLS] format Dynamo emits"
  PARSER.batch.7.b:
    description: Unicode + escaped chars
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "Tōkyō \"central\""}}][/TOOL_CALLS]'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_7_b
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō "central"
        normal_text: ''
      vllm: *d_7_b
      sglang:
        calls: []
        normal_text: ''
  PARSER.batch.7.c:
    description: Schema mismatch — string value where schema declares integer
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "set_temperature", "arguments": {"celsius": "20"}}][/TOOL_CALLS]'
    tools:
    - name: set_temperature
      parameters:
        type: object
        properties:
          celsius:
            type: integer
    expected:
      dynamo: &d_7_c
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      vllm: *d_7_c
      sglang:
        calls: []
        normal_text: ''
  PARSER.batch.7.d:
    description: Nested object + array
    ref: dynamo
    model_text: '[TOOL_CALLS][{"name": "process_data", "arguments": {"items": [1,2,3], "config": {"nested": true}}}][/TOOL_CALLS]'
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      dynamo: &d_7_d
        calls:
        - name: process_data
          arguments:
            items:
            - 1
            - 2
            - 3
            config:
              nested: true
        normal_text: ''
      vllm: *d_7_d
      sglang:
        calls: []
        normal_text: ''
