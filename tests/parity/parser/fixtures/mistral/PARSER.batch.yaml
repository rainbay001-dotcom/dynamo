family: mistral
model_label: Mistral series
mode: batch
cases:
  PARSER.batch.1:
    description: Single tool call (happy path)
    model_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}][/TOOL_CALLS]'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_1
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm: *d_1
      sglang:
        calls: []
        normal_text: ''
        reason: "SGLang MistralDetector returns calls=[] on the bare [TOOL_CALLS]...[/TOOL_CALLS] format Dynamo emits"
  PARSER.batch.3:
    description: No tool call (plain text)
    model_text: Hello, how can I help you today?
    tools:
    - *id001
    expected:
      dynamo: &d_3
        calls: []
        normal_text: Hello, how can I help you today?
      vllm: *d_3
      sglang: *d_3
  PARSER.batch.9:
    description: Empty input
    model_text: ''
    tools:
    - *id001
    expected:
      dynamo: &d_9
        calls: []
        normal_text: ''
      vllm: *d_9
      sglang: *d_9
  PARSER.batch.10:
    description: Duplicate calls (same name twice)
    model_text: '[TOOL_CALLS][{"name": "get_weather", "arguments": {"location": "NYC"}}, {"name": "get_weather", "arguments":
      {"location": "LA"}}][/TOOL_CALLS]'
    tools:
    - *id001
    expected:
      dynamo: &d_10
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_10
      sglang:
        calls: []
        normal_text: ''
        reason: "SGLang MistralDetector returns calls=[] on the bare [TOOL_CALLS]...[/TOOL_CALLS] format Dynamo emits"
