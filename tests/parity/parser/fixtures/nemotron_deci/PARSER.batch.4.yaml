family: nemotron_deci
mode: batch
cases:
  PARSER.batch.4.a:
    description: TOOLCALL wrapper with garbage
    ref: dynamo
    model_text: <TOOLCALL>not a json array</TOOLCALL>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: <TOOLCALL>not a json array</TOOLCALL>
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  PARSER.batch.4.b:
    description: Unterminated JSON string in args
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_weather", "arguments": {"location": "NYC</TOOLCALL>'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  PARSER.batch.4.c:
    description: Missing name key in JSON
    ref: dynamo
    model_text: '<TOOLCALL>[{"arguments": {"location": "NYC"}}]</TOOLCALL>'
    tools:
    - *id001
    expected:
      dynamo:
        calls: []
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
  PARSER.batch.4.d:
    description: Mismatched JSON brackets
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_weather", "arguments": {"location": "NYC"}}</TOOLCALL>'
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        normal_text: ''
      vllm:
        unavailable: vLLM has no parser for family='nemotron_deci'
      sglang:
        unavailable: SGLang has no detector for family='nemotron_deci'
