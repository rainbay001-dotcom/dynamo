family: nemotron_deci
mode: batch
cases:
  PARSER.batch.6.a:
    description: 'Canonical "arguments": {}'
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_time", "arguments": {}}]</TOOLCALL>'
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
  PARSER.batch.6.b:
    description: Whitespace inside arguments {}
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_time", "arguments": { }}]</TOOLCALL>'
    tools:
    - *id001
    expected:
      calls:
      - name: get_time
        arguments: {}
      normal_text: ''
  PARSER.batch.6.c:
    description: No arguments key
    ref: dynamo
    model_text: '<TOOLCALL>[{"name": "get_time"}]</TOOLCALL>'
    tools:
    - *id001
    expected:
      calls: []
      normal_text: ''
