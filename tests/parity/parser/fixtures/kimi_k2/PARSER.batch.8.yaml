family: kimi_k2
mode: batch
cases:
  PARSER.batch.8.a:
    description: Narration before tool call only
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_kimi_k2_tool_parser.py#L272
    model_text: I'll check the weather. <|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:0<|tool_call_argument_begin|>{"location":"Dallas"}<|tool_call_end|><|tool_calls_section_end|>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Dallas
        normal_text: I'll check the weather.
      vllm:
        calls:
        - arguments:
            location: Dallas
          name: get_weather
        normal_text: 'I''ll check the weather. '
        reason: "preserves trailing space; Dynamo trims it"
      sglang:
        calls:
        - arguments:
            location: Dallas
          name: get_weather
        normal_text: 'I''ll check the weather. '
  PARSER.batch.8.b:
    description: Narration after tool call only
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/test_kimi_k2_tool_parser.py#L435
    model_text: <|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:0<|tool_call_argument_begin|>{"location":"Dallas"}<|tool_call_end|><|tool_calls_section_end|>
      Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Dallas
        normal_text: Let me know if you need more.
      vllm:
        calls:
        - arguments:
            location: Dallas
          name: get_weather
        normal_text: ''
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang:
        calls:
        - arguments:
            location: Dallas
          name: get_weather
        normal_text: ''
  PARSER.batch.8.c:
    description: Narration both before and after (sandwich)
    ref: dynamo
    model_text: I'll check the weather. <|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:0<|tool_call_argument_begin|>{"location":"Dallas"}<|tool_call_end|><|tool_calls_section_end|>
      Let me know if you need more.
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Dallas
        normal_text: I'll check the weather.  Let me know if you need more.
      vllm:
        calls:
        - arguments:
            location: Dallas
          name: get_weather
        normal_text: 'I''ll check the weather. '
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang:
        calls:
        - arguments:
            location: Dallas
          name: get_weather
        normal_text: 'I''ll check the weather. '
  PARSER.batch.8.d:
    description: Narration between multiple tool calls
    ref: dynamo
    model_text: First check Dallas. <|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:0<|tool_call_argument_begin|>{"location":"Dallas"}<|tool_call_end|><|tool_calls_section_end|>
      Then check NYC. <|tool_calls_section_begin|><|tool_call_begin|>functions.get_weather:1<|tool_call_argument_begin|>{"location":"NYC"}<|tool_call_end|><|tool_calls_section_end|>
    tools:
    - *id001
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: Dallas
        - name: get_weather
          arguments:
            location: NYC
        normal_text: First check Dallas.  Then check NYC.
      vllm:
        calls:
        - arguments:
            location: Dallas
          name: get_weather
        - arguments:
            location: NYC
          name: get_weather
        normal_text: 'First check Dallas. '
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang:
        calls:
        - arguments:
            location: Dallas
          name: get_weather
        - arguments:
            location: NYC
          name: get_weather
        normal_text: 'First check Dallas. '
