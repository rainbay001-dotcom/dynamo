family: kimi_k2
mode: batch
cases:
  PARSER.batch.6.a:
    description: Canonical empty {} arguments
    ref: dynamo
    model_text: <|tool_calls_section_begin|><|tool_call_begin|>functions.get_time:0<|tool_call_argument_begin|>{}<|tool_call_end|><|tool_calls_section_end|>
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &d_6_a
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_a
      sglang: *d_6_a
  PARSER.batch.6.b:
    description: Whitespace inside empty {}
    ref: dynamo
    model_text: <|tool_calls_section_begin|><|tool_call_begin|>functions.get_time:0<|tool_call_argument_begin|>{ }<|tool_call_end|><|tool_calls_section_end|>
    tools:
    - *id001
    expected:
      dynamo: &d_6_b
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_b
      sglang: *d_6_b
  PARSER.batch.6.c:
    description: No argument body (skip argument_begin → end)
    ref: dynamo
    model_text: <|tool_calls_section_begin|><|tool_call_begin|>functions.get_time:0<|tool_call_end|><|tool_calls_section_end|>
    tools:
    - *id001
    expected:
      dynamo: &d_6_c
        calls: []
        normal_text: ''
      vllm: *d_6_c
      sglang: *d_6_c
