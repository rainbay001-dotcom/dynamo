family: pythonic
mode: batch
cases:
  PARSER.batch.7.a:
    description: Standard scalar types
    ref: dynamo
    model_text: '[book_flight(destination="Paris", passengers=2, first_class=True)]'
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &d_7_a
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            passengers: 2
            first_class: true
        normal_text: ''
      vllm: *d_7_a
      sglang: *d_7_a
  PARSER.batch.7.b:
    description: Unicode + escaped chars
    ref: dynamo
    model_text: '[get_weather(location="Tōkyō \"central\"")]'
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_7_b
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō "central"
        normal_text: ''
      vllm: *d_7_b
      sglang: *d_7_b
  PARSER.batch.7.c:
    description: Schema mismatch — string value where schema declares integer
    ref: dynamo
    model_text: '[set_temperature(celsius="20")]'
    tools:
    - name: set_temperature
      parameters:
        type: object
        properties:
          celsius:
            type: integer
    expected:
      dynamo: &d_7_c
        calls:
        - name: set_temperature
          arguments:
            celsius: '20'
        normal_text: ''
      vllm: *d_7_c
      sglang: *d_7_c
  PARSER.batch.7.d:
    description: Nested dict + array (existing)
    ref: dynamo
    model_text: '[process_data(items=[1, 2, 3], config={"nested": True})]'
    tools:
    - name: process_data
      parameters:
        type: object
        properties:
          items:
            type: array
          config:
            type: object
    expected:
      dynamo: &d_7_d
        calls:
        - name: process_data
          arguments:
            items:
            - 1
            - 2
            - 3
            config:
              nested: true
        normal_text: ''
      vllm: *d_7_d
      sglang: *d_7_d
