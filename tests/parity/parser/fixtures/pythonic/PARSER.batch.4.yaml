family: pythonic
mode: batch
cases:
  PARSER.batch.4.a:
    description: Bracket form with garbage call
    ref: dynamo
    model_text: '[not a valid python call]'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_4_a
        calls: []
        normal_text: '[not a valid python call]'
      vllm: *d_4_a
      sglang: *d_4_a
  PARSER.batch.4.b:
    description: Missing closing bracket
    ref: dynamo
    model_text: '[get_weather(location="NYC"'
    tools:
    - *id001
    expected:
      dynamo: &d_4_b
        calls: []
        normal_text: '[get_weather(location="NYC"'
      vllm: *d_4_b
      sglang: *d_4_b
  PARSER.batch.4.d:
    description: Mismatched paren / bracket
    ref: dynamo
    model_text: '[get_weather(location="NYC"]'
    tools:
    - *id001
    expected:
      dynamo: &d_4_d
        calls: []
        normal_text: '[get_weather(location="NYC"]'
      vllm: *d_4_d
      sglang: *d_4_d
