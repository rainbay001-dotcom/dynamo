family: pythonic
mode: batch
cases:
  PARSER.batch.6.a:
    description: Empty parens (no args)
    ref: dynamo
    model_text: '[get_time()]'
    tools:
    - &id001
      name: get_time
      parameters:
        type: object
        properties: {}
    expected:
      dynamo: &d_6_a
        calls:
        - name: get_time
          arguments: {}
        normal_text: ''
      vllm: *d_6_a
      sglang: *d_6_a
  PARSER.batch.6.b:
    description: Whitespace inside parens
    ref: dynamo
    model_text: '[get_time( )]'
    tools:
    - *id001
    expected:
      dynamo: &d_6_b
        calls: []
        normal_text: '[get_time( )]'
      vllm: *d_6_b
      sglang: *d_6_b
