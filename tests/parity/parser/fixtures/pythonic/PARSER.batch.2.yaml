family: pythonic
mode: batch
cases:
  PARSER.batch.2.a:
    description: Parallel calls in single bracket
    ref: dynamo
    model_text: '[get_weather(location="NYC"), get_time(timezone="EST")]'
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2_a
      sglang: *d_2_a
  PARSER.batch.2.c:
    description: With surrounding narration
    ref: dynamo
    model_text: 'Both: [get_weather(location="NYC"), get_time(timezone="EST")] Done.'
    tools:
    - *id001
    - *id002
    expected:
      dynamo:
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Both:'
      vllm:
        calls: []
        normal_text: 'Both: [get_weather(location="NYC"), get_time(timezone="EST")] Done.'
        reason: "vLLM rejects bracket-call form when surrounded by interleaved text; Dynamo extracts the calls"
      sglang:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: 'Both:  Done.'
  PARSER.batch.2.d:
    description: Same-name twice
    ref: dynamo
    model_text: '[get_weather(location="NYC"), get_weather(location="LA")]'
    tools:
    - *id001
    - *id001
    expected:
      dynamo: &d_2_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_2_d
      sglang: *d_2_d
