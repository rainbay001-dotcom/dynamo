family: nemotron_nano
mode: batch
cases:
  PARSER.batch.7.a:
    description: Multiple parameters
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=book_flight>
      <parameter=destination>
      Paris
      </parameter>
      <parameter=passengers>
      2
      </parameter>
      <parameter=first_class>
      true
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      calls:
      - name: book_flight
        arguments:
          destination: Paris
          passengers: 2
          first_class: true
      normal_text: ''
  PARSER.batch.7.b:
    description: Unicode in parameter
    ref: dynamo
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      Tōkyō central
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: Tōkyō central
      normal_text: ''
