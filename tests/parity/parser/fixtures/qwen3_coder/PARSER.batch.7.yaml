family: qwen3_coder
mode: batch
cases:
  PARSER.batch.7.a:
    description: Multiple parameters (existing multi-arg shape)
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L220
    model_text: |-
      <tool_call>
      <function=book_flight>
      <parameter=destination>
      Paris
      </parameter>
      <parameter=passengers>
      2
      </parameter>
      <parameter=first_class>
      true
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      dynamo: &d_7_a
        calls:
        - name: book_flight
          arguments:
            destination: Paris
            first_class: true
            passengers: 2
        normal_text: ''
      vllm: *d_7_a
      sglang:
        calls:
        - arguments:
            destination: Paris
            first_class: 'true'
            passengers: '2'
          name: book_flight
        normal_text: ''
        reason: "SGLang's qwen3_coder parser does not coerce parameter values via the tool schema, so booleans / integers surface as raw strings; vLLM and Dynamo coerce."
  PARSER.batch.7.b:
    description: Unicode in parameter value
    ref: originated from https://github.com/vllm-project/vllm/blob/b53c507bc91f87e28b03e9b54bbff7c76e97d58b/tests/tool_parsers/common_tests.py#L302
    model_text: |-
      <tool_call>
      <function=get_weather>
      <parameter=location>
      Tōkyō central
      </parameter>
      </function>
      </tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo: &d_7_b
        calls:
        - name: get_weather
          arguments:
            location: Tōkyō central
        normal_text: ''
      vllm: *d_7_b
      sglang: *d_7_b
