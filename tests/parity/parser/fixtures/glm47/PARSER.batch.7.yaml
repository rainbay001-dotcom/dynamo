family: glm47
mode: batch
cases:
  PARSER.batch.7.a:
    description: Multiple parameters (existing multi-arg shape)
    ref: dynamo
    model_text: <tool_call>book_flight<arg_key>destination</arg_key><arg_value>Paris</arg_value><arg_key>passengers</arg_key><arg_value>2</arg_value><arg_key>first_class</arg_key><arg_value>true</arg_value></tool_call>
    tools:
    - name: book_flight
      parameters:
        type: object
        properties:
          destination:
            type: string
          passengers:
            type: integer
          first_class:
            type: boolean
    expected:
      calls:
      - name: book_flight
        arguments:
          first_class: true
          passengers: 2
          destination: Paris
      normal_text: ''
  PARSER.batch.7.b:
    description: Unicode in arg value
    ref: dynamo
    model_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>Tōkyō central</arg_value></tool_call>
    tools:
    - name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      calls:
      - name: get_weather
        arguments:
          location: Tōkyō central
      normal_text: ''
