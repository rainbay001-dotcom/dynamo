family: glm47
mode: batch
cases:
  PARSER.batch.2.a:
    description: Parallel calls (different names)
    ref: dynamo
    model_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call><tool_call>get_time<arg_key>timezone</arg_key><arg_value>EST</arg_value></tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    - &id002
      name: get_time
      parameters:
        type: object
        properties:
          timezone:
            type: string
    expected:
      dynamo: &d_2_a
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: ''
      vllm: *d_2_a
      sglang: *d_2_a
  PARSER.batch.2.c:
    description: Parallel calls with surrounding narration
    ref: dynamo
    model_text: 'Checking: <tool_call>get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call><tool_call>get_time<arg_key>timezone</arg_key><arg_value>EST</arg_value></tool_call>
      Done.'
    tools:
    - *id001
    - *id002
    expected:
      dynamo: &d_2_c
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_time
          arguments:
            timezone: EST
        normal_text: 'Checking:  Done.'
      vllm:
        calls:
        - arguments:
            location: NYC
          name: get_weather
        - arguments:
            timezone: EST
          name: get_time
        normal_text: 'Checking: '
        reason: "drops trailing normal_text after tool-call wrapper end"
      sglang: *d_2_c
  PARSER.batch.2.d:
    description: Same-name twice (id distinctness)
    ref: dynamo
    model_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call><tool_call>get_weather<arg_key>location</arg_key><arg_value>LA</arg_value></tool_call>
    tools:
    - *id001
    - *id001
    expected:
      dynamo: &d_2_d
        calls:
        - name: get_weather
          arguments:
            location: NYC
        - name: get_weather
          arguments:
            location: LA
        normal_text: ''
      vllm: *d_2_d
      sglang: *d_2_d
