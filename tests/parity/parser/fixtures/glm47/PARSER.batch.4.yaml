family: glm47
mode: batch
cases:
  PARSER.batch.4.a:
    description: Tool_call wrapper with no function name
    ref: dynamo
    model_text: <tool_call><arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call>
    tools:
    - &id001
      name: get_weather
      parameters:
        type: object
        properties:
          location:
            type: string
    expected:
      dynamo:
        calls: []
        normal_text: <tool_call><arg_key>location</arg_key><arg_value>NYC</arg_value></tool_call>
      vllm:
        calls:
        - arguments: {}
          name: <arg_key>location</arg_key><arg_value>NYC</arg_value>
        normal_text: ''
        reason: "impl-defined recovery contract (see PARSER_CASES.md)"
      sglang:
        calls: []
        normal_text: ''
        reason: "sglang nullifies normal_text on malformed/recovery shapes where Dynamo preserves input"
  PARSER.batch.4.d:
    description: Missing </arg_value> end tag
    ref: dynamo
    model_text: <tool_call>get_weather<arg_key>location</arg_key><arg_value>NYC</tool_call>
    tools:
    - *id001
    expected:
      dynamo: &d_4_d
        calls:
        - name: get_weather
          arguments: {}
        normal_text: ''
      vllm: *d_4_d
      sglang: *d_4_d
