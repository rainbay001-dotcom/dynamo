# Inference Gateway (GAIE) topology for vanilla vLLM + native Dynamo EPP.
#   client -> Gateway(kgateway) -> HTTPRoute -> InferencePool -> (ext_proc) EPP
#                                                      |-> selects vanilla vLLM pods
# The EPP currently runs in the build pod (epp-build); `epp-vanilla-epp` Service
# targets it. Productionizing = a real EPP Deployment running the same binary.
apiVersion: v1
kind: Service
metadata: { name: epp-vanilla-epp, namespace: mkhadkevich-dev, labels: { owner: claude-epp } }
spec:
  selector: { purpose: epp-build }
  ports:
  - { name: grpc-ext-proc, port: 9002, targetPort: 9002, appProtocol: http2 }
  - { name: health, port: 9003, targetPort: 9003 }
---
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata: { name: epp-vanilla-pool, namespace: mkhadkevich-dev, labels: { owner: claude-epp } }
spec:
  selector:
    matchLabels: { app: epp-vanilla-vllm }
  targetPorts:
  - { number: 8000 }
  endpointPickerRef:
    name: epp-vanilla-epp
    port: { number: 9002 }
    failureMode: FailOpen
# No own Gateway: agentgateway here uses a shared data plane. We attach our
# route (cross-namespace parentRef) to the shared gateway agentgateway-system/
# inference-gateway, with a unique hostname to disambiguate from other routes.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: { name: epp-vanilla-route, namespace: mkhadkevich-dev, labels: { owner: claude-epp } }
spec:
  parentRefs:
  - { name: inference-gateway, namespace: agentgateway-system }
  hostnames:
  - epp-vanilla.local
  rules:
  - backendRefs:
    - { group: inference.networking.k8s.io, kind: InferencePool, name: epp-vanilla-pool }
