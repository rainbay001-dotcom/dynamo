#
# Single-Pod dev harness for validating the planner -> annotation -> NVML
# enforcement chain on a live cluster.  Use this *instead of* daemonset.yaml
# during development; once the chain works end-to-end the same image and
# command go into the DaemonSet template.
#
# Prerequisites:
#   1. Apply rbac.yaml first (substituting POWER_AGENT_NAMESPACE):
#         POWER_AGENT_NAMESPACE=<ns> envsubst < deploy/power_agent/rbac.yaml \
#           | kubectl apply -n <ns> -f -
#   2. Create the script ConfigMap from the source file (do NOT inline here —
#      the script is ~500 lines and changes frequently):
#         kubectl -n <ns> create configmap dynamo-power-agent-script \
#           --from-file=power_agent.py=components/power_agent/power_agent.py
#   3. Pin nodeName to the GPU node hosting the workload pod you want to
#      annotate.  Edit the `nodeName:` field below before applying.
#
# Apply:
#     kubectl apply -n <ns> -f deploy/power_agent/dev-pod.yaml
#
# This pod uses the vllm-runtime image (already cached on every GPU node by
# qwen3-quickstart) which ships with pynvml.  It pip-installs the remaining
# kubernetes/prometheus-client deps at startup so we don't need a custom
# image during dev iteration.

apiVersion: v1
kind: Pod
metadata:
  name: dynamo-power-agent-dev
  labels:
    app: dynamo-power-agent
    role: dev
spec:
  serviceAccountName: dynamo-power-agent
  hostPID: true                          # needed: read host /proc/<pid>/cgroup
  restartPolicy: Never                   # dev pod — let it stay Failed if it crashes so we can read logs
  terminationGracePeriodSeconds: 30      # SIGTERM handler restores TGP

  # `nvidia` runtimeClass + NVIDIA_VISIBLE_DEVICES=all gives the container
  # access to libnvidia-ml.so.1 and all GPUs WITHOUT consuming a
  # `nvidia.com/gpu` resource claim (which would block a worker from
  # scheduling).  This is the same pattern DCGM exporter uses.
  runtimeClassName: nvidia

  # PIN to the node hosting the qwen3-quickstart worker.  Override before apply.
  # Find a candidate node with:
  #     kubectl get pods -n <your-namespace> -l nvidia.com/dynamo-component-type=worker \
  #         -o jsonpath='{.items[*].spec.nodeName}'
  nodeName: <GPU_NODE_NAME>

  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

  containers:
    - name: power-agent
      # vllm-runtime is already cached on every GPU node and bundles pynvml.
      # We add `kubernetes` and `prometheus-client` at container start.
      image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.1
      imagePullPolicy: IfNotPresent

      command: ["bash", "-c"]
      args:
        - |
          set -euo pipefail
          echo "[dev-pod] Installing python deps (kubernetes, prometheus-client)…"
          pip install --quiet --no-input kubernetes prometheus-client
          echo "[dev-pod] Starting Power Agent on node=$NODE_NAME…"
          exec python3 /scripts/power_agent.py \
            --safe-default-watts=$SAFE_DEFAULT_WATTS \
            --node-name=$NODE_NAME \
            --prometheus-port=9100

      env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        # 70% of A100 SXM4 80GB max (400 W).  Override per SKU.
        - name: SAFE_DEFAULT_WATTS
          value: "280"
        # Inject NVML lib + expose all GPUs without claiming a resource.
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"

      securityContext:
        privileged: true                  # nvmlDeviceSetPowerManagementLimit
        readOnlyRootFilesystem: false
        runAsUser: 0                      # vllm-runtime defaults to USER=dynamo;
                                          # we need root to write to the
                                          # hostPath state dir AND to call
                                          # nvmlDeviceSetPowerManagementLimit
                                          # (NVML refuses non-root unless the
                                          # host is configured otherwise).

      ports:
        - name: metrics
          containerPort: 9100
          protocol: TCP

      resources:
        requests: { cpu: "50m",  memory: "128Mi" }
        limits:   { cpu: "500m", memory: "512Mi" }

      volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
        - name: power-agent-state
          mountPath: /var/lib/dynamo-power-agent

  volumes:
    - name: script
      configMap:
        name: dynamo-power-agent-script
        items:
          - key: power_agent.py
            path: power_agent.py
            mode: 0o755
    - name: power-agent-state
      hostPath:
        path: /var/lib/dynamo-power-agent
        type: DirectoryOrCreate
