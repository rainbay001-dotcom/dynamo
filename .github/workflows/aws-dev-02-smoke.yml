name: aws-dev-02 runner smoke
# Validates the aws-dev-02 H100 self-hosted runner end to end:
# the runner-coordinator pod, the ARC k8s container-hook job pod, the shared
# FSx _work permission fix, GPU allocation, and one real KVBM consolidator test.
# Scoped to a dedicated test branch so it never runs on normal PRs.
on:
  push:
    branches: [test/aws-dev-02-runner-smoke]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: aws-dev-02-tester-amd-gpu-v2
    container:
      # Pin to an already-built image so we don't trigger a full image build.
      image: ${{ vars.RUNNERS_REGISTRY }}/ai-dynamo/dynamo:0dfe187b04d2af5a4b6366a4e8e348ba1045d124-vllm-runtime-test
      env:
        # Required: dynamo image user is UID 1000, runner job pod runs as UID 1001.
        HOME: /__w/dynamo/dynamo
        USER: dynamo
    steps:
      - uses: actions/checkout@v4
      - name: Identity and writable work dir
        run: |
          id
          touch "$GITHUB_WORKSPACE/_perm_probe" && echo "WORKSPACE WRITABLE"
          df -h "$GITHUB_WORKSPACE"
      - name: GPUs visible
        run: nvidia-smi -L

  consolidator:
    needs: smoke
    runs-on: aws-dev-02-tester-amd-gpu-v2
    container:
      image: ${{ vars.RUNNERS_REGISTRY }}/ai-dynamo/dynamo:0dfe187b04d2af5a4b6366a4e8e348ba1045d124-vllm-runtime-test
      env:
        HOME: /__w/dynamo/dynamo
        USER: dynamo
    steps:
      - uses: actions/checkout@v4
      - name: KVBM consolidator basic flow
        env:
          HF_HOME: /scratch/hf
        run: |
          cd /workspace
          python -m pytest \
            tests/kvbm_integration/test_consolidator_router_e2e.py::TestConsolidatorRouterE2E::test_basic_consolidator_flow \
            -v -s -p no:cacheprovider
