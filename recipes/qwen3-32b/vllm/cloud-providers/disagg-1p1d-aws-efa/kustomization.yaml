#
# AWS EKS (p5.48xlarge, H100) — KV transfer over AWS EFA via NIXL LIBFABRIC.
# The deploy delta lives in delta.yaml; the small benchmark delta (name + the
# frontend it targets + the artifact-dir slug) is inline below.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Renames q32b-1p1d -> q32b-1p1d-efa (and the benchmark pod accordingly); the
# operator then exposes the frontend as q32b-1p1d-efa-frontend.
nameSuffix: -efa
resources:
- ../_base
patches:
- path: delta.yaml
  target: { group: nvidia.com, version: v1alpha1, kind: DynamoGraphDeployment }
- target: { version: v1, kind: Pod }
  patch: |
    apiVersion: v1
    kind: Pod
    metadata: { name: q32b-1p1d-benchmark }
    spec:
      containers:
      - name: python
        env:
        - { name: FRONTEND,     value: q32b-1p1d-efa-frontend }
        - { name: VARIANT_SLUG, value: aws-efa }
